services:
  - type: web
    name: avi-tailoring
    env: php
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      npm install
      npm run build
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    startCommand: php artisan migrate --force && heroku-php-apache2 public/
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        fromValue: ${APP_KEY}
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromValue: ${DB_HOST}
      - key: DB_DATABASE
        fromValue: ${DB_DATABASE}
      - key: DB_USERNAME
        fromValue: ${DB_USERNAME}
      - key: DB_PASSWORD
        fromValue: ${DB_PASSWORD}
